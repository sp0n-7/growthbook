type: object
required:
  - baseVersion
  - version
  - comment
  - date
  - status
  - rules
properties:
  baseVersion:
    type: integer
  version:
    type: integer
  comment:
    type: string
  date:
    type: string
    format: date-time
  status:
    type: string
    enum:
      - draft
      - published
      - discarded
      - approved
      - changes-requested
      - pending-review
  publishedBy:
    type: string
  defaultValue:
    type: string
    description: The serialized default value at this revision (JSON-encoded for `valueType=json`)
  rules:
    type: object
    additionalProperties:
      type: array
      items:
        $ref: "./FeatureRule.yaml"
  definitions:
    type: object
    additionalProperties:
      type: string
      description: "A JSON stringified [FeatureDefinition](#tag/FeatureDefinition_model)"
