type: object
required:
  - featureId
  - version
  - baseVersion
  - status
  - dateCreated
  - dateUpdated
  - datePublished
  - createdBy
  - publishedBy
  - comment
  - defaultValue
  - rules
properties:
  featureId:
    type: string
  version:
    type: integer
    description: Monotonically-increasing revision number for this feature
  baseVersion:
    type: integer
    description: The version this revision was based on (the live version at the time of fork)
  status:
    type: string
    enum:
      - draft
      - published
      - discarded
      - approved
      - changes-requested
      - pending-review
  dateCreated:
    type: string
    format: date-time
  dateUpdated:
    type: string
    format: date-time
  datePublished:
    type: string
    format: date-time
    nullable: true
    description: When this revision was published to live, or null if not yet published
  createdBy:
    allOf:
      - $ref: "./EventUser.yaml"
    nullable: true
  publishedBy:
    allOf:
      - $ref: "./EventUser.yaml"
    nullable: true
  comment:
    type: string
  defaultValue:
    type: string
    description: The serialized default value at this revision (JSON-encoded for `valueType=json`)
  rules:
    type: object
    additionalProperties:
      type: array
      items:
        $ref: "./FeatureRule.yaml"
    description: Rules per environment, keyed by environment name
